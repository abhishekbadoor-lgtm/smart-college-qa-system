{% extends 'custom_admin/base.html' %}

{% block title %}Post Notice{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
    <h1 class="h2">Post Notice</h1>
    <a href="{% url 'admin_notice_list' %}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" id="title" name="title" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label">Content</label>
                        <textarea id="content" name="content" class="form-control" rows="6" required></textarea>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" id="is_public" name="is_public" class="form-check-input" checked>
                        <label for="is_public" class="form-check-label">Public Notice (Visible to all)</label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Post Notice</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
