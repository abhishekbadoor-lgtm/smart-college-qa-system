{% extends 'student_dashboard/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Submit Feedback</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Feedback Recipient</label>
                        <div class="d-flex gap-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="recipient_type" id="recipient_admin"
                                    value="ADMIN" checked onchange="toggleFacultySelect()">
                                <label class="form-check-label" for="recipient_admin">
                                    Admin
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="recipient_type"
                                    id="recipient_faculty" value="FACULTY" onchange="toggleFacultySelect()">
                                <label class="form-check-label" for="recipient_faculty">
                                    Faculty
                                </label>
                            </div>
                        </div>
                    </div>

                    <div id="faculty_select_container" class="mb-3" style="display: none;">
                        <label for="faculty" class="form-label fw-bold">Select Faculty</label>
                        <select name="faculty" id="faculty" class="form-select">
                            <option value="">-- Select Faculty --</option>
                            {% for f in faculties %}
                            <option value="{{ f.user.id }}">{{ f.user.get_full_name|default:f.user.username }} ({{ f.department }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label fw-bold">Message</label>
                        <textarea name="message" id="message" rows="5" class="form-control"
                            placeholder="Write your feedback here..." required></textarea>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Submit Feedback</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-3 text-center">
            <a href="{% url 'student_feedback_list' %}" class="text-decoration-none">
                <i class="bi bi-list-stars"></i> View My Feedbacks
            </a>
        </div>
    </div>
</div>

<script>
    function toggleFacultySelect() {
        const facultyRadio = document.getElementById('recipient_faculty');
        const container = document.getElementById('faculty_select_container');
        const facultySelect = document.getElementById('faculty');

        if (facultyRadio.checked) {
            container.style.display = 'block';
            facultySelect.required = true;
        } else {
            container.style.display = 'none';
            facultySelect.required = false;
        }
    }
</script>
{% endblock %}
