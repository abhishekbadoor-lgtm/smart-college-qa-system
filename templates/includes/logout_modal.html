<!-- Logout Confirmation Modal -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-danger text-white border-bottom-0">
                <h5 class="modal-title" id="logoutModalLabel">
                    <i class="fas fa-sign-out-alt me-2"></i>Confirm Logout
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-3">
                    <i class="fas fa-exclamation-circle text-danger" style="font-size: 3rem; opacity: 0.8;"></i>
                </div>
                <h4 class="fw-bold">Are you sure?</h4>
                <p class="text-muted">You are about to end your current session. You will need to log in again to access
                    your dashboard.</p>
            </div>
            <div class="modal-footer border-top-0 pb-4 justify-content-center">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Stay Here</button>
                <a href="{% url 'logout' %}" class="btn btn-danger px-4 shadow-sm">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout Now
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    #logoutModal .modal-content {
        border-radius: 1rem;
        overflow: hidden;
    }

    #logoutModal .modal-header {
        padding: 1.5rem;
    }

    #logoutModal .btn {
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.2s;
    }

    #logoutModal .btn-danger:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(220, 53, 69, 0.3);
    }
</style>
